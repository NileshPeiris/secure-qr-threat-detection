{% extends "base.html" %}

{% block content %}
<style>
/* ── Base reset ──────────────────────────────────────── */
body {
    background-color: #060d1a !important;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* Transparent navbar on landing */
.navbar { background-color: transparent !important; border-bottom: none !important; }
#nav-links, #themeToggle { display: none !important; }

/* ── Particle canvas background ─────────────────────── */
#particle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* ── Scan-line sweep overlay ─────────────────────────── */
#scan-line {
    position: fixed;
    top: -4px; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, transparent, #00c8ff, transparent);
    box-shadow: 0 0 18px 6px rgba(0,200,255,0.35);
    z-index: 1;
    animation: scanSweep 4s linear infinite;
}
@keyframes scanSweep {
    0%   { top: -4px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
}

/* ── Landing container ───────────────────────────────── */
.landing-container {
    position: relative;
    z-index: 2;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    margin-top: -30px;
}

/* ── Hero image: floating + glow pulse ───────────────── */
.landing-image-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 36px;
}
.landing-image {
    max-width: 100%;
    max-height: 58vh;
    width: auto; height: auto;
    object-fit: contain;
    animation: heroFloat 5s ease-in-out infinite, heroFadeIn 1.2s ease forwards;
    filter: drop-shadow(0 0 30px rgba(0, 180, 255, 0.3));
    opacity: 0;
}
@keyframes heroFadeIn {
    to { opacity: 1; }
}
@keyframes heroFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
}

/* Pulsing glow ring behind the lock image */
.glow-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 55%; height: 70%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,140,255,0.18) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
}
@keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
    50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 1;   }
}

/* ── Threat label chips floating around the image ──── */
.threat-labels {
    position: absolute;
    inset: 0;
    pointer-events: none;
}
.threat-label {
    position: absolute;
    background: rgba(0,20,50,0.82);
    border: 1px solid rgba(0,180,255,0.4);
    color: #7dd3fc;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.04em;
    backdrop-filter: blur(6px);
    animation: labelDrift 6s ease-in-out infinite;
    opacity: 0;
}
.threat-label:nth-child(1){ top:  8%; left: -12%; animation-delay: 0.4s; }
.threat-label:nth-child(2){ top: 30%; right:-14%; animation-delay: 1.0s; }
.threat-label:nth-child(3){ top: 62%; left: -10%; animation-delay: 1.6s; }
.threat-label:nth-child(4){ top: 80%; right:-12%; animation-delay: 2.2s; }
.threat-label:nth-child(5){ top: 50%; left:  50%; transform:translateX(-50%); animation-delay:2.8s; }

@keyframes labelDrift {
    0%   { opacity:0; transform: translateY(6px); }
    15%  { opacity:1; transform: translateY(0); }
    85%  { opacity:1; transform: translateY(0); }
    100% { opacity:0; transform: translateY(-6px); }
}
.threat-label.danger  { border-color: rgba(239,68,68,0.6);  color:#fca5a5; }
.threat-label.warn    { border-color: rgba(234,179,8,0.6);  color:#fde68a; }
.threat-label.safe    { border-color: rgba(34,197,94,0.6);  color:#86efac; }

/* ── Typewriter status ticker ────────────────────────── */
.status-ticker {
    font-size: 0.8rem;
    color: rgba(100,200,255,0.7);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    min-height: 1.2em;
    font-family: 'Courier New', monospace;
}
.status-ticker::after {
    content: '|';
    animation: blink 0.8s step-end infinite;
    margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Buttons ─────────────────────────────────────────── */
.btn-wrapper {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: btnEntrance 0.8s ease 1.2s forwards;
}
@keyframes btnEntrance {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0);    }
}

.scan-btn {
    background: linear-gradient(135deg, #2563eb, #06b6d4);
    border: none;
    padding: 15px 42px;
    font-size: 1.15rem;
    font-weight: 700;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 8px 25px -5px rgba(59,130,246,0.5);
}
.scan-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 50%; height: 200%;
    background: rgba(255,255,255,0.18);
    transform: skewX(-20deg);
    animation: shimmerBtn 3s ease-in-out infinite;
}
@keyframes shimmerBtn {
    0%  { left: -60%; opacity:0; }
    20% { opacity:1; }
    60% { left: 130%; opacity:0; }
    100%{ left: 130%; }
}
.scan-btn:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 16px 35px -5px rgba(59,130,246,0.65);
    color: white;
}

.btn-outline-cyber {
    border: 2px solid rgba(6,182,212,0.7);
    color: #67e8f9;
    background: rgba(6,182,212,0.08);
    backdrop-filter: blur(6px);
    border-radius: 50px;
    padding: 15px 32px;
    font-weight: 700;
    font-size: 1.1rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.25s ease;
}
.btn-outline-cyber:hover {
    background: rgba(6,182,212,0.22);
    color: #fff;
    transform: translateY(-4px);
    box-shadow: 0 0 20px rgba(6,182,212,0.4);
    border-color: #67e8f9;
}

/* ── Corner hex decorations (pure CSS) ──────────────── */
.hex-deco {
    position: fixed;
    width: 180px; height: 180px;
    border: 1px solid rgba(0,180,255,0.1);
    border-radius: 6px;
    transform: rotate(20deg);
    animation: hexSpin 20s linear infinite;
    pointer-events: none;
    z-index: 0;
}
.hex-deco:nth-child(1){ top:-60px;  left:-60px;  animation-direction:normal; }
.hex-deco:nth-child(2){ bottom:-60px; right:-60px; animation-direction:reverse; }
@keyframes hexSpin { to { transform: rotate(380deg); } }

</style>

<!-- Particle canvas -->
<canvas id="particle-canvas"></canvas>
<!-- Scan line sweep -->
<div id="scan-line"></div>
<!-- Corner decorations -->
<div class="hex-deco"></div>
<div class="hex-deco"></div>

<div class="landing-container">

    <!-- Hero image with glow + floating threat labels -->
    <div class="landing-image-wrap">
        <div class="glow-ring"></div>

        <div class="threat-labels">
            <span class="threat-label danger"><i class="fa fa-triangle-exclamation me-1"></i>Phishing Detected</span>
            <span class="threat-label safe"><i class="fa fa-shield-check me-1"></i>URL Verified Safe</span>
            <span class="threat-label warn"><i class="fa fa-eye me-1"></i>VirusTotal Scan</span>
            <span class="threat-label danger"><i class="fa fa-skull me-1"></i>Malware Blocked</span>
            <span class="threat-label safe"><i class="fa fa-lock me-1"></i>2FA Verified</span>
        </div>

        <img class="landing-image"
             src="{{ url_for('static', filename='landing_image.png') }}"
             alt="Secure QR-Based Intelligent Threat Detection and Access Control Framework">
    </div>

    <!-- Typewriter status ticker -->
    <div class="status-ticker" id="status-ticker">Initializing threat engine</div>

    <!-- CTA Buttons -->
    <div class="btn-wrapper">
        <a href="/auth/login" class="scan-btn">
            <i class="fa-solid fa-lock"></i> Secure Login
        </a>
        <a href="/auth/register" class="btn-outline-cyber">
            <i class="fa-solid fa-user-plus"></i> Create Account
        </a>
    </div>

</div>

<script>
// ── 1. Transparent navbar ─────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
    const nav = document.querySelector('.navbar');
    if (nav) { nav.style.backgroundColor = 'transparent'; nav.style.boxShadow = 'none'; }
});

// ── 2. Particle network canvas ────────────────────────
(function() {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const PARTICLE_COUNT = 70;
    const LINK_DIST      = 130;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
            x:  Math.random() * W,
            y:  Math.random() * H,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            r:  Math.random() * 1.8 + 0.8
        });
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Move
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;
        });

        // Draw links
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < LINK_DIST) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(0,180,255,${0.18 * (1 - d/LINK_DIST)})`;
                    ctx.lineWidth   = 0.8;
                    ctx.stroke();
                }
            }
        }

        // Draw dots
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,210,255,0.55)';
            ctx.fill();
        });

        requestAnimationFrame(draw);
    }
    draw();
})();

// ── 3. Typewriter ticker ──────────────────────────────
(function() {
    const messages = [
        'Initializing threat engine...',
        'ML model loaded — phishing detector active',
        'VirusTotal API connected',
        'Google Safe Browsing ready',
        'Zero-trust access control enabled',
        'Awaiting QR scan input',
    ];
    const el  = document.getElementById('status-ticker');
    let msgIdx = 0, charIdx = 0, deleting = false;

    function type() {
        const current = messages[msgIdx];
        if (!deleting) {
            el.textContent = current.substring(0, ++charIdx);
            if (charIdx === current.length) { deleting = true; setTimeout(type, 1800); return; }
        } else {
            el.textContent = current.substring(0, --charIdx);
            if (charIdx === 0) { deleting = false; msgIdx = (msgIdx + 1) % messages.length; }
        }
        setTimeout(type, deleting ? 35 : 55);
    }
    type();
})();
</script>
{% endblock %}
